<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <link rel="stylesheet" type="text/css" href="styles/custom2.css">

    <title>Cadastro produtos</title>
</head>

<body>
    <div class="d-flex">

        <div class="sidebar d-flex flex-column justify-content-between">

            <div>
                <h4 class="logo">🍽️ O Mesão</h4>

                <ul class="nav flex-column mt-4">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">🏠 Mesas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">📦 Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">📊 Relatórios</a>
                    </li>
                </ul>
            </div>

            <div class="logout">
                ← Sair do sistema
            </div>

        </div>

        <div class="container mt-4">
            <div class="card card-custom">
                <div class="card-body">
                    <h4 class="card-title">Cadastro de Produtos</h4>
                    <form>
                        <div class="form-group">
                            <label for="productName">Nome do Produto</label>
                            <input type="text" class="form-control" id="productName"
                                placeholder="Digite o nome do produto">
                        </div>
                        <div class="form-group">
                            <label for="productDescription">Descrição</label>
                            <textarea class="form-control" id="productDescription" rows="3"
                                placeholder="Digite a descrição do produto"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="productPrice">Preço</label>
                            <input type="number" class="form-control" id="productPrice"
                                placeholder="Digite o preço do produto">
                        </div>
                        <div class="form-group">
                            <label for="productCategory">Categoria</label>
                            <select class="form-control" id="productCategory">
                                <option>Eletrônicos</option>
                                <option>Roupas</option>
                                <option>Alimentos</option>
                                <option>Móveis</option>
                                <option>Livros</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </form>
                </div>
            </div>
        </div>

        <div>
            <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
                integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
                crossorigin="anonymous"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
                crossorigin="anonymous"></script>
        </div>
</body>

</html>
